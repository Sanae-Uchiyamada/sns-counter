<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X文字数カウントツール</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f8fa;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 600px;
  margin: auto;
}

textarea {
  width: 100%;
  min-height: 120px;
  font-size: 16px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-top: 12px;
}

.count {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-weight: bold;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

.copy {
  background: #1d9bf0;
  color: white;
}

.clear {
  background: #e0245e;
  color: white;
}

.over { color: red; }
.ok { color: green; }

.preview-text {
  white-space: pre-wrap;
  word-break: break-word;
}

a.link {
  color: #1d9bf0;
  text-decoration: none;
}
a.link:hover {
  text-decoration: underline;
}

/* トースト */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s ease;
  z-index: 9999;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 40px;
  height: 40px;
  background: #ccc;
  border-radius: 50%;
}
</style>
</head>

<body>
<div class="container">

<h2>X 投稿チェックツール</h2>

<textarea id="input" placeholder="投稿を入力..."></textarea>

<div class="count">
  <span id="count">文字数: 0</span>
  <span id="remain">残り: 280</span>
</div>

<div class="buttons">
  <button class="copy" onclick="copyText()">コピー</button>
  <button class="clear" onclick="clearText()">クリア</button>
</div>

<!-- プレビュー -->
<div class="card">
  <div class="header">
    <div class="avatar"></div>
    <div>
      <div><b>ユーザー名</b></div>
      <div style="color:gray">@username</div>
    </div>
  </div>

  <div id="preview" class="preview-text" style="margin-top:10px;">
    投稿内容がここに表示されます
  </div>
</div>

</div>

<script>
const input = document.getElementById("input");
const countEl = document.getElementById("count");
const remainEl = document.getElementById("remain");
const preview = document.getElementById("preview");

const urlRegex = /(https?:\/\/[^\s]+|www\.[^\s]+)/g;
const hashtagRegex = /#[\wぁ-んァ-ン一-龥]+/g;

// ✅ X文字数カウント
function countX(text) {
  let total = 0;
  const urls = text.match(urlRegex) || [];
  total += urls.length * 23;

  const noUrl = text.replace(urlRegex, "");

  for (let char of noUrl) {
    if (char === "\n") total++;
    else if (/[\x00-\x7F]/.test(char)) total++;
    else total += 2;
  }

  return total;
}

// ✅ URL短縮表示
function shortenURL(url) {
  try {
    const fullUrl = url.startsWith("http") ? url : "https://" + url;
    const u = new URL(fullUrl);

    // ✅ www を削除
    let hostname = u.hostname.replace(/^www\./, "");

    return hostname + "/…";
  } catch {
    return url;
  }
}

function formatText(text) {
  return text
    .replace(urlRegex, (url) => {
      const display = shortenURL(url);
      const href = url.startsWith("http") ? url : "https://" + url;

      // ✅ 元のURLを完全に置き換える
      return `<a href="${href}" target="_blank" class="link">${display}</a>`;
    })
    .replace(hashtagRegex, (tag) =>
      `<span class="link">${tag}</span>`
    );
}
``
// ✅ トースト
function showToast(message) {
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.textContent = message;

  document.body.appendChild(toast);

  setTimeout(() => toast.classList.add("show"), 10);

  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

// ✅ コピー
function copyText() {
  navigator.clipboard.writeText(input.value);
  showToast("コピーしました ✅");
}

// ✅ クリア
function clearText() {
  input.value = "";
  update();
}

// ✅ 更新処理
function update() {
  const text = input.value;

  const count = countX(text);
  const remain = 280 - count;

  countEl.textContent = "文字数: " + count;
  remainEl.textContent = "残り: " + remain;
  remainEl.className = remain < 0 ? "over" : "ok";

  preview.innerHTML = text
    ? formatText(text)
    : "投稿内容がここに表示されます";
}

input.addEventListener("input", update);
</script>

</body>
</html>
